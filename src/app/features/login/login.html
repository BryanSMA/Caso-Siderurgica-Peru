<div class="login-page">
  <div class="login-card">

    <div class="login-brand">
      <div class="login-brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="login-brand-text">
        <h1>Siderúrgica Perú</h1>
        <span>ERP ENTERPRISE SYSTEM</span>
      </div>
    </div>

    <h2 class="login-title">Bienvenido de vuelta</h2>
    <p class="login-sub">Ingrese sus credenciales para acceder al sistema</p>

    <div class="form-group">
      <label class="form-label">USUARIO / EMAIL</label>
      <div class="input-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input
          type="text"
          class="form-input"
          placeholder="usuario@siderurgicaperu.com"
          [(ngModel)]="username">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">CONTRASEÑA</label>
      <div class="input-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input
          type="password"
          class="form-input"
          placeholder="••••••••"
          [(ngModel)]="password">
      </div>
    </div>

    <div class="login-options">
      <label class="checkbox-row">
        <input type="checkbox" [(ngModel)]="rememberMe"> Mantener sesión iniciada
      </label>
      <span class="login-forgot">¿Olvidó su contraseña?</span>
    </div>

    <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

    <button class="btn-login" (click)="onLogin()" [disabled]="loading">
      {{ loading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
    </button>

    <!-- Botón ir al Home -->
    <button class="btn-home" (click)="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Ir al Inicio
    </button>

    <p class="login-footer">
      Siderúrgica Perú S.A.C. — Sistema ERP v3.2.1<br>
      © 2025 Todos los derechos reservados
    </p>

  </div>
</div>
