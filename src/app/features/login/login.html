<div class="login-page">

  <div class="bg-glow-left"></div>
  <div class="bg-glow-right"></div>
  <div class="bg-grid"></div>

  <div class="sidebar-accent"></div>
  <div class="sidebar-text">Sistema ERP Empresarial &nbsp;·&nbsp; Siderúrgica Perú S.A.C.</div>
  <div class="corner-tag">v3.2.1 &nbsp;/&nbsp; 2026</div>

  <div class="login-card">

    <div class="status-badge">
      <span class="status-dot"></span>
      Sistema activo
    </div>

    <div class="login-brand">
      <div class="login-brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="login-brand-text">
        <h1>Siderúrgica Perú</h1>
        <span>ERP Enterprise System</span>
      </div>
    </div>

    <div class="sep">
      <div class="sep-line"></div>
      <div class="sep-diamond"></div>
      <div class="sep-line sep-line--right"></div>
    </div>

    <h2 class="login-title">Bienvenido de vuelta</h2>
    <p class="login-sub">Ingrese sus credenciales para acceder al sistema</p>

    <div class="form-group">
      <label class="form-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Usuario / Email
      </label>
      <div class="input-wrap">
        <input
          type="text"
          class="form-input"
          placeholder="usuario@siderurgicaperu.com"
          [(ngModel)]="username">
        <div class="input-accent"></div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Contraseña
      </label>
      <div class="input-wrap">
        <input
          type="password"
          class="form-input"
          placeholder="••••••••"
          [(ngModel)]="password">
        <div class="input-accent"></div>
      </div>
    </div>

    <div class="login-options">
      <label class="checkbox-row">
        <input type="checkbox" [(ngModel)]="rememberMe">
        <span class="checkbox-custom"></span>
        Mantener sesión iniciada
      </label>
    </div>

    <div class="error-msg" *ngIf="errorMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMsg }}
    </div>

    <button class="btn-login" (click)="onLogin()" [disabled]="loading">
      <span *ngIf="!loading">
        Iniciar Sesión
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </span>
      <span *ngIf="loading" class="btn-loading">
        <span class="spinner"></span>
        Iniciando sesión...
      </span>
    </button>

    <button class="btn-home" (click)="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Ir al Inicio
    </button>

    <p class="login-footer">
      Siderúrgica Perú S.A.C. — Sistema ERP v3.2.1<br>
      © 2026 Todos los derechos reservados
    </p>

  </div>
</div>
