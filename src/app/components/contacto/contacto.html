<section id="contacto" class="section">
  <div class="container text-center" style="margin-bottom: 40px;">
    <span class="section-badge">Hablemos</span>
    <h2>Contacto Corporativo</h2>
  </div>

  <div class="container contact-grid">
    <div class="contact-info">
      <h3>Sede Principal</h3>
      <p style="color: var(--c-steel); margin-bottom: 30px;">Comunícate con nuestros asesores comerciales para cotizaciones por volumen.</p>

      <div class="c-item">
        <i class='bx bx-map'></i>
        <div class="c-text">
          <h4>Dirección Industrial</h4>
          <p>Av. Evitamiento 1450, Parque Industrial.</p>
        </div>
      </div>
      <div class="c-item">
        <i class='bx bx-phone'></i>
        <div class="c-text">
          <h4>Teléfono Directo</h4>
          <p>+51 01 455-8020 / +51 987 654 321</p>
        </div>
      </div>
      <div class="c-item">
        <i class='bx bx-envelope'></i>
        <div class="c-text">
          <h4>Correo Corporativo</h4>
          <p>ventas&#64;siderurgicaperu.com.pe</p>
        </div>
      </div>
    </div>

    <div class="contact-form">
      <div class="form-group">
        <label>Razón Social o Empresa</label>
        <input type="text" class="form-control" placeholder="Nombre comercial de la empresa">
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="form-group">
          <label>Teléfono de Contacto</label>
          <input type="text" class="form-control" placeholder="Opcional">
        </div>
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" class="form-control" placeholder="correo&#64;empresa.com">
        </div>
      </div>
      <div class="form-group">
        <label>Detalle del Requerimiento</label>
        <textarea class="form-control" placeholder="Especifique el tonelaje, tipos de perfiles u otras consultas..."></textarea>
      </div>
      <button type="button" class="btn btn-primary" style="width: 100%; justify-content: center;">Enviar Consulta Corporativa</button>
    </div>
  </div>
</section>
