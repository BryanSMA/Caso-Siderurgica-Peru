<section class="section bg-light proceso-section">
  <div class="container">
    <div class="section-heading centered">
      <span class="section-badge">Cómo trabajamos</span>
      <h2>Gestión Ágil y Segura</h2>
      <p>Nuestro flujo de atención está diseñado para que tu industria no se detenga.</p>
    </div>

    <div class="process-track">
      <div class="process-line"></div>

      <div class="process-step">
        <div class="step-bubble">
          <i class='bx bx-file'></i>
        </div>
        <div class="step-num">01</div>
        <div class="step-label">Solicitud de<br>Cotización</div>
      </div>

      <div class="process-step">
        <div class="step-bubble">
          <i class='bx bx-calculator'></i>
        </div>
        <div class="step-num">02</div>
        <div class="step-label">Cotización y<br>Aprobación</div>
      </div>

      <div class="process-step">
        <div class="step-bubble">
          <i class='bx bx-receipt'></i>
        </div>
        <div class="step-num">03</div>
        <div class="step-label">Registro de<br>Pedido</div>
      </div>

      <div class="process-step">
        <div class="step-bubble">
          <i class='bx bx-cog'></i>
        </div>
        <div class="step-num">04</div>
        <div class="step-label">Facturación<br>Interna</div>
      </div>

      <div class="process-step">
        <div class="step-bubble active">
          <i class='bx bx-truck'></i>
        </div>
        <div class="step-num">05</div>
        <div class="step-label">Envío y<br>Despacho</div>
      </div>
    </div>
  </div>
</section>
